<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DORA & MaRisk — Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #00ff88;
    --accent4: #ffd700;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-mid: #94a3b8;
    --marisk-color: #818cf8;
    --dora-color: #00d4ff;
    --eba-color: #34d399;
    --critical: #f87171;
    --warning: #fbbf24;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .header-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--text-mid);
    font-weight: 300;
    margin-bottom: 20px;
  }

  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .legal-refs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .legal-ref {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* PROGRESS BAR */
  .progress-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 40px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* BREADCRUMB */
  .breadcrumb {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 32px;
    min-height: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .breadcrumb-item { color: var(--text-dim); }
  .breadcrumb-item.active { color: var(--accent); }
  .breadcrumb-sep { color: var(--border); }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .question-hint {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 28px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid var(--border);
    border-radius: 0 6px 6px 0;
  }

  .question-hint strong { color: var(--text-mid); font-style: normal; }

  /* ANSWER BUTTONS */
  .answers {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .answer-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .answer-btn:hover {
    border-color: var(--accent);
    background: rgba(0, 212, 255, 0.06);
    transform: translateX(4px);
  }

  .answer-btn.yes:hover { border-color: var(--accent3); background: rgba(0,255,136,0.06); }
  .answer-btn.no:hover { border-color: var(--accent2); background: rgba(255,107,53,0.06); }

  .answer-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }

  .answer-btn.yes .answer-icon { background: rgba(0,255,136,0.15); color: var(--accent3); }
  .answer-btn.no .answer-icon { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .answer-btn.maybe .answer-icon { background: rgba(255,215,0,0.15); color: var(--accent4); }

  .answer-label { font-size: 15px; font-weight: 600; }
  .answer-sublabel { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* RESULT CARD */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 1px;
    background: linear-gradient(135deg, var(--accent3), var(--accent), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .result-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent3);
    margin-bottom: 20px;
  }

  .classification-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .class-badge {
    padding: 16px;
    border-radius: 8px;
    border: 1px solid;
  }

  .class-badge.marisk {
    border-color: rgba(129,140,248,0.3);
    background: rgba(129,140,248,0.08);
  }
  .class-badge.dora {
    border-color: rgba(0,212,255,0.3);
    background: rgba(0,212,255,0.08);
  }
  .class-badge.eba {
    border-color: rgba(52,211,153,0.3);
    background: rgba(52,211,153,0.08);
  }

  .class-badge-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .class-badge.marisk .class-badge-label { color: var(--marisk-color); }
  .class-badge.dora .class-badge-label { color: var(--dora-color); }
  .class-badge.eba .class-badge-label { color: var(--eba-color); }

  .class-badge-value {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }

  .implications-title {
    font-weight: 600;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
  }

  .implication-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
  }

  .implication-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .implication-list li::before {
    content: '→';
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .examples-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 28px;
  }

  .examples-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent4);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .examples-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .example-tag {
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--accent4);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* BUTTONS */
  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 6px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #33ddff; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: var(--text-mid);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--text-mid); color: var(--text); }

  /* BACK BUTTON */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text-mid); }
  .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ALERT */
  .alert {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  .alert-warning {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    color: var(--warning);
  }
  .alert-critical {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    color: var(--critical);
  }
  .alert-icon { flex-shrink: 0; font-size: 16px; }

  /* RESTART */
  .restart-area {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .question-card, .result-card { padding: 24px 20px; }
    .classification-grid { grid-template-columns: 1fr; }
  }

  /* TIMELINE BANNER */
  .timeline-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--accent);
  }
  .timeline-banner .tl-icon {
    font-size: 18px;
    flex-shrink: 0;
  }
  .timeline-banner strong {
    color: #fff;
    font-weight: 600;
  }

  /* CHECKLIST */
  .checklist-section {
    margin-bottom: 28px;
  }
  .checklist-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent4);
    margin-bottom: 12px;
  }
  .checklist {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.5;
    background: rgba(255,255,255,0.01);
    transition: background 0.15s;
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item:hover { background: rgba(255,255,255,0.03); }
  .checklist-item input[type="checkbox"] {
    accent-color: var(--accent3);
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
  }
  .checklist-item label {
    cursor: pointer;
    flex: 1;
  }
  .checklist-item input:checked + label {
    text-decoration: line-through;
    color: var(--text-dim);
  }
  .checklist-item .ci-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .ci-tag.legal { background: rgba(129,140,248,0.15); color: var(--marisk-color); }
  .ci-tag.risk { background: rgba(248,113,113,0.15); color: var(--critical); }
  .ci-tag.ops { background: rgba(0,255,136,0.12); color: var(--accent3); }
  .ci-tag.mgmt { background: rgba(255,215,0,0.12); color: var(--accent4); }

  /* CTPP FLAG */
  .ctpp-flag {
    display: flex;
    gap: 14px;
    background: rgba(255,107,53,0.07);
    border: 1px solid rgba(255,107,53,0.35);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .ctpp-flag-icon { font-size: 20px; flex-shrink: 0; }
  .ctpp-flag-body { flex: 1; }
  .ctpp-flag-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .ctpp-flag-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
  .ctpp-flag-text strong { color: var(--accent2); }

  /* NON-EU PROVIDER FLAG */
  .non-eu-flag {
    display: flex;
    gap: 14px;
    background: rgba(255,215,0,0.07);
    border: 1px solid rgba(255,215,0,0.35);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .non-eu-flag-icon { font-size: 20px; flex-shrink: 0; }
  .non-eu-flag-body { flex: 1; }
  .non-eu-flag-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent4);
    margin-bottom: 6px;
  }
  .non-eu-flag-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
  .non-eu-flag-text strong { color: var(--accent4); }

  /* BAFIN FLAG */
  .bafin-flag {
    display: flex;
    gap: 14px;
    background: rgba(129,140,248,0.07);
    border: 1px solid rgba(129,140,248,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 24px;
  }
  .bafin-flag-icon { font-size: 20px; flex-shrink: 0; }
  .bafin-flag-body { flex: 1; }
  .bafin-flag-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--marisk-color);
    margin-bottom: 6px;
  }
  .bafin-flag-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
  .bafin-flag-text strong { color: #c7d2fe; }

  /* LANDING SCREEN */
  .landing-screen {
    animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .landing-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .landing-intro::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3), transparent);
  }
  .landing-intro-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .landing-intro-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }
  .landing-intro-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .landing-question-label {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin: 24px 0 14px;
  }
  .landing-choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 8px;
  }
  @media (max-width: 600px) { .landing-choice-grid { grid-template-columns: 1fr; } }
  .landing-choice-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .landing-choice-btn:hover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
    transform: translateY(-2px);
  }
  .landing-choice-btn.reassess:hover {
    border-color: var(--marisk-color);
    background: rgba(129,140,248,0.05);
  }
  .landing-choice-icon {
    font-size: 28px;
    margin-bottom: 12px;
    display: block;
  }
  .landing-choice-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .landing-choice-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* BAFIN STEPS */
  .bafin-steps {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bafin-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .bafin-step-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    background: rgba(129,140,248,0.2);
    color: var(--marisk-color);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .bafin-step-text { font-size: 13px; color: var(--text-mid); line-height: 1.5; }
  .bafin-step-text strong { color: #c7d2fe; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-tag">Classification tool</div>
    <h1>MaRisk · DORA · <span>EBA GL</span></h1>
    <p class="subtitle">Interactive decision tree for classifying external and intra-group services and arrangements.</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--marisk-color)"></div> MaRisk AT 9</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--dora-color)"></div> DORA EU 2022/2554</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--eba-color)"></div> EBA/GL/2019/02</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div> § 25b KWG</div>

// State
let history = [];
let currentNode = null;
let arrangementType = null; // 'new' or 'reassess'
let materialityChanged = true; // true/false — only for reassess path; defaults to true (BaFin shown unless explicitly no change)
let _ctppProvider = false;
let _subOutsourcing = false;
let _isIntragroup = false;
let _isCIF = false;
let nonEuProvider = false; // true if ICT CIF external provider is outside the EU
let isReassessment = false; // true if user selected Reassessment path
let checkboxCounter = 0;

const LANDING = '__landing__';
const REASSESS_CHANGE = '__reassess_change__';

function getNode(id) {
  if (id === 'start') return tree;
  return nodes[id] || null;
}

function getResult(id) {
  return results[id] || null;
}

function isResult(id) {
  return id && id.startsWith('result_');
}

function render() {
  const container = document.getElementById('treeContainer');

  if (!currentNode || currentNode === LANDING) {
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('breadcrumb').innerHTML = '';
    document.getElementById('breadcrumb').style.display = 'none';
    document.getElementById('backBtn').style.display = 'none';
    document.querySelector('.progress-bar').style.display = 'none';
    renderLanding(container);
    return;
  }

  if (currentNode === REASSESS_CHANGE) {
    document.getElementById('breadcrumb').style.display = '';
    document.getElementById('backBtn').style.display = '';
    document.querySelector('.progress-bar').style.display = '';
    document.getElementById('progressFill').style.width = '92%';
    document.getElementById('backBtn').disabled = false;
    renderReassessChange(container);
    return;
  }

  document.getElementById('breadcrumb').style.display = '';
  document.getElementById('backBtn').style.display = '';
  document.querySelector('.progress-bar').style.display = '';

  const totalSteps = 9;
  const progress = Math.min((history.length / totalSteps) * 100, 90);
  document.getElementById('progressFill').style.width = progress + '%';

  const bc = document.getElementById('breadcrumb');
  const items = [arrangementType === 'reassess' ? 'Reassessment' : 'New arrangement'];
  history.forEach(h => { if (h.answerLabel) items.push(h.answerLabel); });
  bc.innerHTML = items.map((item, i) => {
    const isLast = i === items.length - 1;
    return `<span class="breadcrumb-item ${isLast ? 'active' : ''}">${item}</span>${!isLast ? '<span class="breadcrumb-sep">›</span>' : ''}`;
  }).join('');

  document.getElementById('backBtn').disabled = history.length === 0;

  if (isResult(currentNode)) {
    renderResult(container, getResult(currentNode));
  } else {
    const node = getNode(currentNode);
    if (node) renderQuestion(container, node);
  }
}

function renderLanding(container) {
  container.innerHTML = `
    <div class="landing-screen">
      <div class="landing-intro">
        <div class="landing-intro-label">Before you start</div>
        <div class="landing-intro-text">
          All external arrangements and intra-group agreements require formal classification under the institution's outsourcing policy and applicable regulatory frameworks.<br><br>
          The classification determines contractual requirements, risk assessment scope, and ongoing monitoring obligations. Intra-group status may reduce procedural burden in limited areas but does not remove contractual, audit, or notification obligations.
        </div>
      </div>
      <div class="landing-question-label">What type of classification is this?</div>
      <div class="landing-choice-grid">
        <button class="landing-choice-btn" onclick="setArrangementType('new')">
          <span class="landing-choice-icon">🆕</span>
          <div class="landing-choice-title">New arrangement</div>
          <div class="landing-choice-desc">First-time classification of a vendor or service not previously assessed under the institution's outsourcing framework. Applies to external and intra-group arrangements.</div>
        </button>
        <button class="landing-choice-btn reassess" onclick="setArrangementType('reassess')">
          <span class="landing-choice-icon">🔄</span>
          <div class="landing-choice-title">Reassessment</div>
          <div class="landing-choice-desc">Periodic review or re-classification of an existing arrangement following a scope change, contract renewal, or material change in risk profile. Applies to external and intra-group arrangements.</div>
        </button>
      </div>
    </div>
  `;
}

function renderReassessChange(container) {
  container.innerHTML = `
    <div class="question-card">
      <div class="step-label">REASSESSMENT — FINAL STEP</div>
      <div class="question-text">Has the materiality classification changed compared to the previous assessment?</div>
      <div class="question-hint">
        <strong>Materiality change means:</strong> the arrangement was previously classified as non-material (nicht-wesentlich) and is now material (wesentlich), or vice versa.<br><br>
        <strong>No BaFin notification needed if:</strong> classification stays the same — even if scope, contract terms, or vendor details changed.<br>
        <strong>BaFin notification required if:</strong> non-material → material, or material → non-material.
      </div>
      <div class="answers">
        <button class="answer-btn yes" onclick="setMaterialityChanged(true)">
          <div class="answer-icon">YES</div>
          <div>
            <div class="answer-label">YES — materiality has changed</div>
            <div class="answer-sublabel">e.g. non-material → material, or material → non-material</div>
          </div>
        </button>
        <button class="answer-btn no" onclick="setMaterialityChanged(false)">
          <div class="answer-icon">NO</div>
          <div>
            <div class="answer-label">NO — same materiality as before</div>
            <div class="answer-sublabel">Classification unchanged — only scope or terms updated</div>
          </div>
        </button>
      </div>
    </div>
  `;
}

function setArrangementType(type) {
  arrangementType = type;
  isReassessment = (type === 'reassess');
  materialityChanged = true;
  history = [];
  currentNode = isReassessment ? 'q_reassessment_materiality_change' : 'start';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setMaterialityChanged(changed) {
  materialityChanged = changed;
  const lastEntry = history[history.length - 1];
  const resultNode = lastEntry?.nextResult;
  history.push({ node: REASSESS_CHANGE, answerLabel: changed ? 'Materiality changed' : 'Same materiality' });
  currentNode = resultNode;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getBafinHtml(result) {
  if (!result.bafin_required) {
    return `
      <div class="bafin-flag">
        <div class="bafin-flag-icon">🏛</div>
        <div class="bafin-flag-body">
          <div class="bafin-flag-title">BaFin Notification</div>
          <div class="bafin-flag-text">${result.bafin}</div>
        </div>
      </div>`;
  }

  if (arrangementType === 'reassess') {
    if (!materialityChanged) {
      return `
        <div class="bafin-flag">
          <div class="bafin-flag-icon">🏛</div>
          <div class="bafin-flag-body">
            <div class="bafin-flag-title">BaFin Notification — Reassessment</div>
            <div class="bafin-flag-text">
              <strong>No BaFin notification required.</strong> The materiality classification has not changed.
              Document the reassessment outcome in your internal outsourcing register and update the Register of Information if any details changed.
            </div>
          </div>
        </div>`;
    } else {
      return `
        <div class="bafin-flag">
          <div class="bafin-flag-icon">🏛</div>
          <div class="bafin-flag-body">
            <div class="bafin-flag-title">BaFin Notification — Materiality Change</div>
            <div class="bafin-flag-text">
              <strong>Notification required — materiality has changed.</strong>
              <div class="bafin-steps">
                <div class="bafin-step">
                  <div class="bafin-step-num">1</div>
                  <div class="bafin-step-text"><strong>Reclassification notification</strong> — notify BaFin of the materiality change, the reason, and the updated classification. Include the updated risk assessment. Submit via BaFin reporting portal.</div>
                </div>
              </div>
              <div style="margin-top:10px; font-size:12px; color:var(--text-dim);">Legal basis: § 25b KWG / MaRisk AT 9.2</div>
            </div>
          </div>
        </div>`;
    }
  }

  // New arrangement — 2 notifications
  return `
    <div class="bafin-flag">
      <div class="bafin-flag-icon">🏛</div>
      <div class="bafin-flag-body">
        <div class="bafin-flag-title">BaFin Notification — New Material Arrangement</div>
        <div class="bafin-flag-text">
          <strong>Two notifications required.</strong> Submit via BaFin reporting portal. Outsourcing Officer sign-off required before each submission.
          <div class="bafin-steps">
            <div class="bafin-step">
              <div class="bafin-step-num">1</div>
              <div class="bafin-step-text"><strong>Intention to Outsource</strong> — notify BaFin <em>before contract signing</em>. Include vendor name, service description, materiality rationale, and planned go-live date.</div>
            </div>
            <div class="bafin-step">
              <div class="bafin-step-num">2</div>
              <div class="bafin-step-text"><strong>Go-Live notification</strong> — notify BaFin <em>when the arrangement becomes operational</em>. Confirm contract date, actual go-live, and any deviations from the Intention notification.</div>
            </div>
          </div>
          <div style="margin-top:10px; font-size:12px; color:var(--text-dim);">Legal basis: § 25b KWG / MaRisk AT 9.2</div>
        </div>
      </div>
    </div>`;
}

function renderQuestion(container, node) {
  container.innerHTML = `
    <div class="question-card">
      <div class="step-label">${node.step || ''}</div>
      <div class="question-text">${node.question}</div>
      ${node.hint ? `<div class="question-hint">${node.hint}</div>` : ''}
      <div class="answers">
        ${node.answers.map(a => `
          <button class="answer-btn ${a.type}" onclick="answer('${a.next}', '${a.label.replace(/'/g, "\\'")}', '${a.action || ''}')">
            <div class="answer-icon">${a.type === 'yes' ? 'YES' : a.type === 'no' ? 'NO' : '?'}</div>
            <div>
              <div class="answer-label">${a.label}</div>
              ${a.sublabel ? `<div class="answer-sublabel">${a.sublabel}</div>` : ''}
            </div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderResult(container, result) {
  // Deep-clone result for dynamic modifications
  const r = JSON.parse(JSON.stringify(result));

  // Dynamic EBA GL + implications for result_class1
  if (currentNode === 'result_class1') {
    const eba = r.classifications.find(c => c.type === 'eba');
    if (_isCIF) {
      eba.value = 'Critical/Important Function — enhanced requirements';
      r.implications.push('EBA GL full CIF due diligence required');
      r.implications.push('EBA GL enhanced contractual requirements for CIF apply');
    } else {
      eba.value = 'Standard due diligence';
      r.implications.push('EBA GL standard due diligence required');
    }
  }

  // Dynamic EBA GL + implications for result_ig1
  if (currentNode === 'result_ig1') {
    const eba = r.classifications.find(c => c.type === 'eba');
    if (_isCIF) {
      eba.value = 'Critical/Important Function intra-group — simplified due diligence permitted';
      r.implications.push('EBA GL full CIF requirements apply — simplified due diligence permitted');
    } else {
      eba.value = 'Standard due diligence — simplified permitted for intra-group';
      r.implications.push('EBA GL standard due diligence required — simplified permitted');
    }
  }

  // Dynamic intragroup implication for result_class2
  if (currentNode === 'result_class2' && _isIntragroup) {
    r.implications.push('Simplified due diligence permitted — intra-group arrangement');
  }

  const alertHtml = r.alert ? `
    <div class="alert alert-${r.alert.type}">
      <div class="alert-icon">${r.alert.type === 'critical' ? '⚠' : '!'}</div>
      <div>${r.alert.text}</div>
    </div>` : '';

  const nonEuHtml = nonEuProvider ? `
    <div class="non-eu-flag">
      <div class="non-eu-flag-icon">🌐</div>
      <div class="non-eu-flag-body">
        <div class="non-eu-flag-title">NON-EU PROVIDER — Additional Requirements</div>
        <div class="non-eu-flag-text">The provider is located outside the EU. <strong>DORA Art. 28(4)(g)</strong> requires the contract to address: data location and applicable data protection law, governing law and jurisdiction, enforceability of audit rights across borders, and the ability of competent authorities to effectively supervise the arrangement. Verify that BaFin and relevant EU regulators can exercise their supervisory rights under the contract.</div>
      </div>
    </div>` : '';

  const ctppHtml = (r.classifications && r.classifications.some(c => c.type === 'dora' && c.value.includes('Art.'))) && window._ctppProvider ? `
    <div class="ctpp-flag">
      <div class="ctpp-flag-icon">⚡</div>
      <div class="ctpp-flag-body">
        <div class="ctpp-flag-title">CTPP — Additional Requirements Apply</div>
        <div class="ctpp-flag-text">
          This provider is designated or potential <strong>Critical Third-Party Provider (CTPP)</strong> under DORA Art. 31-44.
          Additional obligations apply:
          <ul style="margin-top:8px;padding-left:16px;display:flex;flex-direction:column;gap:4px;">
            <li>ESA Lead Overseer oversight applies — monitor recommendations and binding measures</li>
            <li>Concentration risk must account for sector-wide dependency across EU financial sector</li>
            <li>Exit plan must identify genuinely alternative providers outside the CTPP group</li>
            <li>Sub-outsourcing chain must be reported to ESA Lead Overseer</li>
            <li>Monitor ESA CTPP designation list published by EBA/ESMA/EIOPA</li>
          </ul>
        </div>
      </div>
    </div>` : r.ctpp ? `
    <div class="ctpp-flag">
      <div class="ctpp-flag-icon">⚡</div>
      <div class="ctpp-flag-body">
        <div class="ctpp-flag-title">CTPP — Concentration Risk Check Required</div>
        <div class="ctpp-flag-text">${r.ctpp}</div>
      </div>
    </div>` : '';

  const subOutsourcingHtml = (_subOutsourcing && r.bafin_required) ? `
    <div class="ctpp-flag">
      <div class="ctpp-flag-icon">⛓</div>
      <div class="ctpp-flag-body">
        <div class="ctpp-flag-title">SUB-OUTSOURCING — Additional Requirements Apply</div>
        <div class="ctpp-flag-text">
          <ul style="margin-top:8px;padding-left:16px;display:flex;flex-direction:column;gap:4px;">
            <li>Full sub-outsourcing chain must be mapped and documented</li>
            <li>External sub-vendor must be formally approved before engagement</li>
            <li>Sub-outsourcing clause required in the primary contract</li>
            <li>Equivalent contractual requirements must flow down to sub-vendor</li>
            <li>Exit plan must cover failure of the external sub-vendor</li>
            <li>Audit rights must extend to the external sub-vendor</li>
            <li>Register of Information must show the full sub-outsourcing chain</li>
            <li>Concentration risk assessment must cover the full chain</li>
            <li>Annual management report must cover the full sub-outsourcing chain</li>
            <li>BaFin notification must disclose the sub-outsourcing chain</li>
          </ul>
        </div>
      </div>
    </div>` : '';

  const bafinHtml = (isReassessment && materialityChanged === false) ? '' : getBafinHtml(r);

  const reassessmentChecklist = [
    { text: 'Previous classification reviewed and confirmed as still valid', tag: 'ops' },
    { text: 'Rationale for no change in materiality documented', tag: 'risk' },
    { text: 'No new ICT components identified since last assessment', tag: 'ops' },
    { text: 'No change in scope, volume, or service description confirmed', tag: 'ops' },
    { text: 'Provider CTPP status checked — no new designation since last assessment', tag: 'ops' },
    { text: 'Sub-outsourcing arrangements reviewed — no changes identified', tag: 'ops' },
    { text: 'GDPR DPA reviewed and confirmed as current', tag: 'legal' },
    { text: 'Outsourcing register updated with reassessment date', tag: 'ops' },
    { text: 'Outsourcing Officer sign-off on reassessment outcome obtained', tag: 'risk' },
    { text: 'No BaFin notification required — confirmed and documented in writing', tag: 'risk' }
  ];
  const activeChecklist = (isReassessment && materialityChanged === false) ? reassessmentChecklist : r.checklist;
  const checklistTitle = (isReassessment && materialityChanged === false) ? 'REASSESSMENT CHECKLIST' : 'What to prepare before contracting';

  const checklistHtml = activeChecklist ? `
    <div class="checklist-section">
      <div class="checklist-title">${checklistTitle}</div>
      <div class="checklist">
        ${activeChecklist.map((item, i) => {
          const id = 'cb_' + (++checkboxCounter) + '_' + i;
          return `
          <div class="checklist-item">
            <input type="checkbox" id="${id}">
            <label for="${id}">${item.text}</label>
            <span class="ci-tag ${item.tag}">${item.tag}</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  container.innerHTML = `
    <div class="result-card">
      <div class="result-title">✓ Classification determined</div>
      <h2 style="font-size:20px;font-weight:700;color:#fff;margin-bottom:20px;">${r.title}</h2>
      ${alertHtml}
      ${nonEuHtml}
      ${ctppHtml}
      ${subOutsourcingHtml}
      ${bafinHtml}
      <div class="classification-grid">
        ${r.classifications.map(c => `
          <div class="class-badge ${c.type}">
            <div class="class-badge-label">${c.label}</div>
            <div class="class-badge-value">${c.value}</div>
          </div>
        `).join('')}
      </div>
      <div class="implications-title">What this means for you</div>
      <ul class="implication-list">
        ${r.implications.map(i => `<li>${i}</li>`).join('')}
      </ul>
      ${checklistHtml}
      ${r.examples ? `
        <div class="examples-box">
          <div class="examples-title">Examples</div>
          <div class="examples-list">
            ${r.examples.map(e => `<span class="example-tag">${e}</span>`).join('')}
          </div>
        </div>` : ''}
      <div class="restart-area">
        <div class="btn-group">
          <button class="btn btn-primary" onclick="restart()">Classify a new service</button>
          <button class="btn btn-secondary" onclick="goBack()">← Change answer</button>
        </div>
      </div>
    </div>
  `;
}

function answer(nextId, label, action) {
  if (action === 'setNonEuProvider') nonEuProvider = true;
  if (action === 'setMaterialityTrue') materialityChanged = true;
  if (action === 'setMaterialityFalse') materialityChanged = false;
  if (action === 'setCTPP') window._ctppProvider = true;
  if (action === 'setSubOutsourcing') _subOutsourcing = true;
  if (action === 'setIntragroup') _isIntragroup = true;
  if (action === 'setCIF') _isCIF = true;
  history.push({ node: currentNode, answerLabel: label });
  currentNode = nextId;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) {
    currentNode = LANDING;
    arrangementType = null;
    isReassessment = false;
    materialityChanged = true;
    nonEuProvider = false;
    window._ctppProvider = false;
    _subOutsourcing = false;
    _isIntragroup = false;
    _isCIF = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  const prev = history.pop();
  if (currentNode === REASSESS_CHANGE || prev.nextResult) {
    materialityChanged = true;
  }
  if (prev.node === 'q_reassessment_materiality_change') materialityChanged = true;
  if (prev.node === 'q_non_eu_provider') nonEuProvider = false;
  if (prev.node === 'q3e_cloud_ctpp_check' || prev.node === 'q6_ctpp') window._ctppProvider = false;
  if (prev.node === 'q6_ctpp_intra' || prev.node === 'q_non_ict_intragroup_sub' || prev.node === 'q_non_ict_non_cif_intragroup_sub' || prev.node === 'q3d_cloud_intra_sub') _subOutsourcing = false;
  if (prev.node === 'q5_intragroup' || prev.node === 'q3b_cloud_ctpp' || prev.node === 'q_non_ict_cif_intragroup' || prev.node === 'q_non_ict_material_non_cif_intragroup' || prev.node === 'q_non_ict_non_material_intragroup' || prev.node === 'q_ict_intragroup_noncif') _isIntragroup = false;
  if (prev.node === 'q_non_ict_cif' || prev.node === 'q4_critical_func' || prev.node === 'q3_cloud_cif') _isCIF = false;
  currentNode = prev.node;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  history = [];
  currentNode = LANDING;
  arrangementType = null;
  isReassessment = false;
  materialityChanged = true;
  nonEuProvider = false;
  window._ctppProvider = false;
  _subOutsourcing = false;
  _isIntragroup = false;
  _isCIF = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
